<!DOCTYPE html>

<!--
================================================================================
  产品设计文档 — 四港精选 Tab
  版本：v1.0  日期：2026-06-23
================================================================================

一、Tab 定位
--------------------------------------------------------------------------------
  名称：四港精选
  定位：展示已通过审核、已上架运营的精选技能，面向所有普通用户（全量可见）。
  运营视角：管理员可设置推荐位、置顶技能，控制展示顺序。

  与其他 Tab 的关系：
  ┌─────────────┐   ┌─────────────┐   ┌─────────────┐
  │  技能市场     │   │  四港精选     │   │  发布 Skill  │
  │  （搜索发现）  │   │  （精选列表）  │   │  （提交上架）  │
  │  SkillHub    │   │  运营视角     │   │  审批流程     │
  │  全量搜索     │   │  全量可见     │   │  管理视角     │
  └─────────────┘   └─────────────┘   └─────────────┘

二、目标用户
--------------------------------------------------------------------------------
  1. 普通用户：浏览、发现、收藏、立即使用技能
  2. 管理员：配置置顶/推荐位、编辑技能、下架处理

三、功能需求
--------------------------------------------------------------------------------
  F1. 技能列表展示
      - 卡片式列表，展示技能名称、图标、一句话简介、标签、评分、使用量
      - PC 端 3 列网格，移动端 1-2 列

  F2. 分类筛选
      - 顶部分类 Tab：全部 / 写作 / 代码 / 分析 / 客服 / 运营 / 其他
      - 支持多选（可同时选中多个分类）

  F3. 排序切换
      - 综合排序（默认）/ 热度最高 / 最新上架 / 评分最高

  F4. 推荐位
      - 置顶技能展示在最上方，视觉突出（大卡片样式，带"置顶"标签）
      - 管理员可配置哪些技能置顶

  F5. 技能卡片操作
      - 收藏：切换收藏态，实时反馈
      - 立即使用：跳转技能使用页
      - 查看详情：展开详情或跳转详情页

  F6. 分页 / 无限滚动
      - 技能数量多时支持分页加载
      - 骨架屏（skeleton）提升加载感知体验

  F7. 管理员视角（条件显示）
      - 检测用户角色为 admin 时，显示「管理」按钮
      - 管理按钮 → 进入编辑/下架页

四、页面结构
--------------------------------------------------------------------------------
  ┌─────────────────────────────────────────────────────┐
  │  Header: 四港精选  Tab 标识                          │
  ├─────────────────────────────────────────────────────┤
  │  筛选排序栏                                          │
  │  [全部][写作][代码][分析][客服][运营][其他]  |  [综合排序 ▼] │
  ├─────────────────────────────────────────────────────┤
  │  置顶区域（可选，如有置顶技能）                            │
  │  ┌─────────────────────────────────────────────────┐  │
  │  │  [置顶]  大卡片 · 推荐技能                       │  │
  │  └─────────────────────────────────────────────────┘  │
  ├─────────────────────────────────────────────────────┤
  │  技能卡片网格                                         │
  │  ┌─────────┐  ┌─────────┐  ┌─────────┐             │
  │  │ 卡片 1  │  │ 卡片 2  │  │ 卡片 3  │             │
  │  └─────────┘  └─────────┘  └─────────┘             │
  │  ┌─────────┐  ┌─────────┐  ┌─────────┐             │
  │  │ 卡片 4  │  │ 卡片 5  │  │ 卡片 6  │             │
  │  └─────────┘  └─────────┘  └─────────┘             │
  ├─────────────────────────────────────────────────────┤
  │  加载更多 / 分页器                                     │
  └─────────────────────────────────────────────────────┘

五、字段说明
--------------------------------------------------------------------------------
  字段            类型      说明
  ─────────────────────────────────────────────────────────
  skill_id        string   技能唯一 ID
  skill_icon      string   技能图标 URL（支持 emoji 占位）
  skill_name      string   技能名称（最长 20 字符）
  rating          number   评分 0-5，1 位小数
  usage_count     number   使用次数（整数，支持 1.2k 等简写）
  description     string   一句话简介（最长 80 字符，超出省略）
  tags            string[] 标签列表（最多显示 3 个，+N 表示剩余数量）
  scenarios       string   适用场景描述
  category        string   所属分类（writing/code/analysis/service/operation/other）
  is_pinned       boolean  是否置顶
  is_favorited    boolean  当前用户是否已收藏
  published_at    string   上架时间（ISO 格式）
  admin_mode       boolean  是否为管理员视角

六、技术约束
--------------------------------------------------------------------------------
  - 前端框架：React 18 + TypeScript（正式实现时）
  - 样式方案：Tailwind CSS
  - 数据获取：TanStack Query（正式实现时）
  - 本原型：纯 HTML + Tailwind CSS CDN（可独立运行）
  - Mock 数据：内置 JS 数组，前端 JS 实现筛选/排序逻辑

================================================================================
-->

  <style>
    /* 滚动条美化 */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    /* 文字省略 */
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* 骨架屏动画 */
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px;
    }

    /* 卡片悬浮阴影 */
    .card-hover { transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 25px -5px rgba(0,0,0,0.1), 0 4px 10px -6px rgba(0,0,0,0.08); }

    /* 分类按钮选中态 */
    .cat-btn { transition: all 0.15s ease; }
    .cat-btn.active { background-color: #2563eb; color: white; border-color: #2563eb; }
    .cat-btn:not(.active):hover { border-color: #93c5fd; color: #2563eb; }

    /* 收藏按钮动画 */
    @keyframes heartBeat {
      0% { transform: scale(1); }
      25% { transform: scale(1.3); }
      50% { transform: scale(1); }
      75% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    .heart-animate { animation: heartBeat 0.4s ease; }

    /* 置顶卡片边框渐变 */
    .pinned-card {
      background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
      border: 2px solid #bfdbfe;
    }
    .pinned-badge {
      background: linear-gradient(135deg, #f59e0b, #d97706);

    /* 空状态淡入 */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .tag-chip.cyan { background: #ecfeff; color: #0e7490; border-color: #a5f3fc; }
  </style>
</head>

// ===================== 工具函数 =====================
function formatCount(n) {
  if (n >= 10000) return (n / 10000).toFixed(1).replace(/\.0$/, '') + 'w';
  if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
  return n.toString();
}

function formatDate(iso) {
  const d = new Date(iso);
  return `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, '0')}`;
}

function tagColorClass(tag) {
  const map = {
    'AI辅助': 'blue', 'CI集成': 'blue',
    '内容营销': 'orange', '多平台': 'orange', 'SEO优化': 'orange',
    '多轮对话': 'cyan', 'FAQ库': 'cyan',
    '数据可视化': 'green', 'BI报表': 'green', 'Excel': 'green',
    '活动策划': 'rose', '物料管理': 'rose',
    '求职辅助': 'purple', '简历诊断': 'purple',
    'NL2SQL': 'blue', '数据库': 'blue',
    '会议效率': 'cyan', '待办追踪': 'cyan',
  };
  return map[tag] || '';
}

function getTagClass(tag) {
  const color = tagColorClass(tag);
  return color ? `tag-chip ${color}` : 'tag-chip';
}

function getIconBgClass(color) {
  const map = {
    blue: 'bg-blue-100 text-blue-600',
    orange: 'bg-orange-100 text-orange-600',
    cyan: 'bg-cyan-100 text-cyan-600',
    green: 'bg-green-100 text-green-600',
    rose: 'bg-rose-100 text-rose-600',
    purple: 'bg-purple-100 text-purple-600',
  };
  return map[color] || 'bg-slate-100 text-slate-600';
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  toast.classList.remove('hidden');
  setTimeout(() => toast.classList.add('hidden'), 2000);
}

// ===================== 业务逻辑 =====================
function getFilteredSkills() {
  let skills = [...ALL_SKILLS];

  // 分类筛选
  if (currentCategory !== 'all') {
    skills = skills.filter(s => s.category === currentCategory);
  }

  // 排序
  switch (currentSort) {
    case 'hot':
      skills.sort((a, b) => b.usageCount - a.usageCount);
      break;
    case 'newest':
      skills.sort((a, b) => new Date(b.publishedAt) - new Date(a.publishedAt));
      break;
    case 'rating':
      skills.sort((a, b) => b.rating - a.rating);
      break;
    default:
      // 综合排序：置顶优先，然后按使用量
      skills.sort((a, b) => {
        if (a.isPinned && !b.isPinned) return -1;
        if (!a.isPinned && b.isPinned) return 1;
        return b.usageCount - a.usageCount;
      });
  }

  return skills;
}

function render() {
  const filtered = getFilteredSkills();
  const pinned = filtered.filter(s => s.isPinned);
  const normal = filtered.filter(s => !s.isPinned);

  // 空状态
  const emptyState = document.getElementById('emptyState');
  const cardsContainer = document.getElementById('cardsContainer');
  const pinnedSection = document.getElementById('pinnedSection');

  if (filtered.length === 0) {
    emptyState.classList.remove('hidden');
    cardsContainer.innerHTML = '';
    pinnedSection.style.display = 'none';
  } else {
    emptyState.classList.add('hidden');

    // 置顶区域（仅在综合排序 + 有置顶时显示）
    if (pinned.length > 0 && currentSort === 'default' && currentCategory === 'all') {
      pinnedSection.style.display = 'block';
      document.getElementById('pinnedCards').innerHTML = pinned.map(renderPinnedCard).join('');
    } else {
      pinnedSection.style.display = 'none';
    }

    // 普通卡片
    cardsContainer.innerHTML = (currentSort === 'default' && currentCategory === 'all')
      ? normal.map(s => renderCard(s, false)).join('')
      : filtered.map(s => renderCard(s, s.isPinned)).join('');
  }

  document.getElementById('resultCount').textContent = `共 ${filtered.length} 个技能`;
}

function toggleFavorite(id, btnEl) {
  if (favorites.has(id)) {
    favorites.delete(id);
    showToast('已取消收藏');
  } else {
    favorites.add(id);
    showToast('收藏成功');
    if (btnEl) {
      btnEl.classList.add('heart-animate');
      setTimeout(() => btnEl.classList.remove('heart-animate'), 400);
    }
  }
  render();
}

function toggleAdminMode(on) {
  adminMode = on;
  render();
  showToast(on ? '已开启管理员视角' : '已切换普通视角');
}

function clearFilters() {
  currentCategory = 'all';
  currentSort = 'default';
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-category="all"]').classList.add('active');
  document.querySelectorAll('.sort-btn').forEach(b => {
    b.className = b.className.replace('bg-primary-50 text-primary-600 border-primary-200 font-semibold', 'bg-white text-slate-600 border-slate-200 font-medium');
  });
  document.querySelector('[data-sort="default"]').className =
    'sort-btn active text-xs px-3 py-1 rounded-lg bg-primary-50 text-primary-600 font-semibold border border-primary-200';
  render();
}

function openDetailModal(id) {
  const skill = ALL_SKILLS.find(s => s.id === id);
  if (!skill) return;
  document.getElementById('modalContent').innerHTML = renderDetailModal(skill);
  document.getElementById('detailModal').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function closeDetailModal() {
  document.getElementById('detailModal').classList.add('hidden');
  document.body.style.overflow = '';
}

function simulateLoad() {
  const skeleton = document.getElementById('skeletonContainer');
  const cards = document.getElementById('cardsContainer');
  const pinned = document.getElementById('pinnedSection');

  skeleton.style.display = 'grid';
  cards.innerHTML = '';
  pinned.style.display = 'none';

  isLoading = true;

  setTimeout(() => {
    skeleton.style.display = 'none';
    isLoading = false;
    render();
  }, 800);
}

  document.querySelectorAll('.sort-btn').forEach(btn => {

        b.className = b.className
          .replace('bg-primary-50 text-primary-600 border-primary-200 font-semibold', '')
          .replace(/^\s+/, '');
        if (!b.classList.contains('text-xs')) {
          b.className = 'sort-btn text-xs px-3 py-1 rounded-lg bg-white text-slate-600 font-medium border border-slate-200 hover:border-primary-200 hover:text-primary-500';
        } else {
          b.className = b.className
            .replace('bg-primary-50 text-primary-600 border-primary-200 font-semibold', 'bg-white text-slate-600 border-slate-200 font-medium');
        }
      });
      btn.className = 'sort-btn active text-xs px-3 py-1 rounded-lg bg-primary-50 text-primary-600 font-semibold border border-primary-200';
      currentSort = btn.dataset.sort;
      render();
    });
  });

  // 加载更多
  document.getElementById('loadMoreBtn').addEventListener('click', () => {
    showToast('已加载全部技能');
    document.getElementById('loadMoreBtn').style.display = 'none';
    document.getElementById('noMoreHint').style.display = 'block';
  });

  // ESC 关闭 Modal
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeDetailModal();
  });

  // 初始加载
  simulateLoad();
});
</script>
</body>
</html>
